# Google Cloud Build — CI/CD pipeline
# Triggers on every push to main branch.
#
# ════════════════════════════════════════════════════════════════════════════
# ONE-TIME SETUP  (run once in Google Cloud Shell)
# ════════════════════════════════════════════════════════════════════════════
#
# 1. Set your project:
#      gcloud config set project YOUR_PROJECT_ID
#
# 2. Enable required APIs:
#      gcloud services enable \
#        run.googleapis.com \
#        cloudbuild.googleapis.com \
#        artifactregistry.googleapis.com \
#        secretmanager.googleapis.com
#
# 3. Create Artifact Registry repo (if not already created by Cloud Run console):
#      gcloud artifacts repositories create chat-backend \
#        --repository-format=docker \
#        --location=us-central1
#
# 4. Store secrets in Secret Manager (skip any already created):
#      echo -n "YOUR_MONGO_URI"    | gcloud secrets create MONGO_URI     --data-file=-
#      echo -n "YOUR_GROQ_API_KEY" | gcloud secrets create GROQ_API_KEY  --data-file=-
#      echo -n "YOUR_JWT_SECRET"   | gcloud secrets create JWT_SECRET_KEY --data-file=-
#
# 5. Grant Cloud Build SA the required roles:
#      PROJECT_NUMBER=$(gcloud projects describe YOUR_PROJECT_ID --format='value(projectNumber)')
#      CB_SA="${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com"
#      for ROLE in roles/run.admin roles/iam.serviceAccountUser \
#                  roles/secretmanager.secretAccessor roles/artifactregistry.writer; do
#        gcloud projects add-iam-policy-binding YOUR_PROJECT_ID \
#          --member="serviceAccount:${CB_SA}" --role="$ROLE"
#      done
#
# 6. Grant the Cloud Run SA access to secrets:
#      CR_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
#      for SECRET in MONGO_URI GROQ_API_KEY JWT_SECRET_KEY; do
#        gcloud secrets add-iam-policy-binding $SECRET \
#          --member="serviceAccount:${CR_SA}" \
#          --role="roles/secretmanager.secretAccessor"
#      done
#
# ════════════════════════════════════════════════════════════════════════════

substitutions:
  _REGION: northamerica-northeast1   # ← matches your Cloud Run region
  _SERVICE: chat-backend-rag
  _REPO: chat-backend                # Artifact Registry repo name

steps:
  # ── Step 0: Build Docker image ─────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  # ── Step 1: Push to Artifact Registry ─────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  # ── Step 2: Deploy to Cloud Run ────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated

      # ── Resources — must have 4Gi for sentence-transformer model ─────────
      - --memory=4Gi
      - --cpu=2

      # ── Scaling — min 1 keeps it always live ────────────────────────────
      - --min-instances=1
      - --max-instances=5
      - --concurrency=10

      # ── Timeouts ─────────────────────────────────────────────────────────
      - --timeout=60                  # per-request timeout (seconds)

      # ── Startup CPU boost (faster model load on cold start) ─────────────
      - --cpu-boost

      # ── Secrets from Secret Manager ──────────────────────────────────────
      - --set-secrets=MONGO_URI=MONGO_URI:latest,GROQ_API_KEY=GROQ_API_KEY:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest

      # ── Plain env vars ───────────────────────────────────────────────────
      - --set-env-vars=DB_NAME=chatbot_db,GROQ_MODEL=llama-3.3-70b-versatile,FRONTEND_URL=https://chat-frontend-rag.vercel.app

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

# 30 min — sentence-transformer layer is large to build
timeout: 1800s

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
