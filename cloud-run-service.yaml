# Cloud Run service definition
# Project:  testing-494517
# Region:   northamerica-northeast1
# Service:  chat-backend-rag
# URL:      https://chat-backend-rag-501313895560.northamerica-northeast1.run.app
#
# IMAGE_URL and BUCKET_NAME are substituted by cloudbuild.yaml at deploy time.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: chat-backend-rag
  annotations:
    # GCS FUSE requires BETA launch stage
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        # Always keep 1 instance running (never scale to zero)
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"

        # gen2 execution environment required for GCS FUSE volume mounts
        run.googleapis.com/execution-environment: gen2

        # Keep CPU allocated between requests (needed for ChromaDB background writes)
        run.googleapis.com/cpu-throttling: "false"

    spec:
      # Allow up to 60 seconds per request (LLM calls can be slow)
      timeoutSeconds: 60

      # Handle up to 10 concurrent requests per instance
      containerConcurrency: 10

      containers:
        - image: IMAGE_URL

          ports:
            - name: http1
              containerPort: 8080

          resources:
            limits:
              # sentence-transformers model (~400MB RAM) + ChromaDB + FastAPI
              memory: "4Gi"
              cpu: "2"

          env:
            # ── Secrets from Secret Manager ──────────────────────────────────
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: MONGO_URI
                  key: latest
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GROQ_API_KEY
                  key: latest
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: JWT_SECRET_KEY
                  key: latest

            # ── App config ───────────────────────────────────────────────────
            - name: DB_NAME
              value: "chatbot_db"
            - name: GROQ_MODEL
              value: "llama-3.3-70b-versatile"

            # ── Persistent data paths (served from GCS bucket mount) ──────────
            - name: CHROMA_PATH
              value: "/mnt/data/chroma_db"
            - name: UPLOAD_DIR
              value: "/mnt/data/uploads"

            # ── CORS ─────────────────────────────────────────────────────────
            - name: FRONTEND_URL
              value: "https://chat-frontend-rag.vercel.app"

          volumeMounts:
            - name: gcs-data
              mountPath: /mnt/data

          # Startup probe — wait for sentence-transformer model to load
          startupProbe:
            httpGet:
              path: /health
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10

          # Liveness probe — restart container if app becomes unresponsive
          livenessProbe:
            httpGet:
              path: /health
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        # GCS bucket mounted as persistent filesystem for ChromaDB + uploads
        # The service account running this service must have:
        #   roles/storage.objectAdmin  on the bucket
        - name: gcs-data
          csi:
            driver: gcsfuse.run.googleapis.com
            volumeAttributes:
              bucketName: BUCKET_NAME
